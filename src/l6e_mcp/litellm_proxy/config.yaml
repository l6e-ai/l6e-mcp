# l6e LiteLLM proxy configuration
#
# This config routes all requests through LiteLLM and fires a success callback
# to the l6e callback server so actual token counts are recorded in real time.
# The supported default topology is localhost-only; no public tunnel is needed
# for Cursor -> LiteLLM or LiteLLM -> callback server in the same-machine setup.
#
# Start the proxy:
#   cd /Users/bennett/projects/l6e/mcp
#   litellm --config src/l6e_mcp/litellm_proxy/config.yaml --port 4000
#
# Then point Cursor at the proxy from Cursor Settings -> Models:
#   Override OpenAI Base URL: http://127.0.0.1:4000/cursor
#   OpenAI API Key:          same value as LITELLM_MASTER_KEY
#   Custom model:            one of the model_name aliases below
#
# The callback server must be running before starting the proxy:
#   l6e-callback-server
#
# Optional diagnostics:
#   export L6E_CURSOR_PROXY_CAPTURE_FILE="$PWD/.l6e/cursor-proxy-capture.jsonl"
#
# Prerequisites:
#   pip install "l6e-mcp[proxy]"
#   export ANTHROPIC_API_KEY=<your-anthropic-key>   # for Anthropic models
#   export OPENAI_API_KEY=<your-openai-key>         # for OpenAI models

model_list:
  # --- Anthropic models ---
  # Route claude-sonnet-4-6 through the proxy unchanged.
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # Convenience alias — Cursor sometimes sends the bare model name.
  - model_name: claude-sonnet-4-6-20250219
    litellm_params:
      model: anthropic/claude-sonnet-4-6-20250219
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- OpenAI models ---
  # GPT-4o (Cursor may show as "GPT-4.0" or "4-0" in the UI).
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  # Alias in case Cursor sends "gpt-4.0" for the 4o model.
  - model_name: gpt-4.0
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # Newer Cursor options — add the exact model_id Cursor sends if these fail.
  # Update the litellm model path when OpenAI documents the correct API ID.
  - model_name: gpt-5.2
    litellm_params:
      model: openai/gpt-5.2
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.3-codex
    litellm_params:
      model: openai/gpt-5.3-codex
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  # Strip Cursor's unsupported Responses streaming flag before forwarding
  # OpenAI requests upstream.
  # Forward actual token usage to the l6e callback server after every
  # successful API call. LiteLLM webhooks use `callbacks` +
  # `callback_settings`, not raw URLs inside success_callback.
  callbacks:
    - "cursor_compat.proxy_handler_instance"
    - "l6e_proxy_webhook"

  # Emit token usage in every response so the callback payload always
  # contains usage.prompt_tokens and usage.completion_tokens.
  return_response_headers: true

callback_settings:
  l6e_proxy_webhook:
    callback_type: generic_api
    endpoint: http://127.0.0.1:9000/callback/success
    headers: {}
    event_types:
      - llm_api_success
    # Send one callback per completion for simpler processing.
    log_format: single

general_settings:
  # Master key for the proxy. Use the same value in Cursor's OpenAI API Key
  # field when routing through http://127.0.0.1:4000/cursor.
  master_key: os.environ/LITELLM_MASTER_KEY

  # Drop unknown parameters instead of erroring — Cursor may send
  # Anthropic-specific headers that LiteLLM doesn't recognise.
  drop_params: true

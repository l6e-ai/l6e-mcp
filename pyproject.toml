[project]
name = "l6e-mcp"
version = "0.1.0"
description = "Session-scoped budget enforcement for Cursor, Claude Code, and Windsurf."
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
dependencies = [
    "l6e>=0.1.0",
    "fastmcp>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[project.scripts]
l6e-mcp = "l6e_mcp.server:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[project]
name = "l6e-mcp"
version = "0.1.0"
description = "Session-scoped budget enforcement for Cursor, Claude Code, and Windsurf."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "l6e>=0.1.0",
    "fastmcp>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27.0",
    "mypy>=1.10",
    "ruff>=0.4",
]
# Advanced self-hosted exact accounting path: run a LiteLLM proxy that
# intercepts API calls and posts actual token counts back to l6e_checkpoint in
# real time. Install with: pip install "l6e-mcp[proxy]"
proxy = [
    "litellm[proxy]>=1.0.0",
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
    "httpx>=0.27.0",
]

[project.scripts]
l6e-mcp = "l6e_mcp.server:main"
l6e-callback-server = "l6e_mcp.litellm_proxy.callback_server:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.11"
files = ["src"]
exclude = ["tests/"]
ignore_missing_imports = true

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
